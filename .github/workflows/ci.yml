name: CI

on:
  push:
    branches: [ master, work ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Windows Desktop workload
        run: dotnet workload install windows

      - name: Restore
        run: dotnet restore ApexComputerUse.sln

      - name: Build
        run: dotnet build ApexComputerUse.sln -c Release --no-restore

      - name: Test
        run: dotnet test ApexComputerUse.Tests/ApexComputerUse.Tests.csproj -c Release --no-build --logger "console;verbosity=normal"
